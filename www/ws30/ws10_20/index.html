    <!-- ===== from Frame.html : scripts ===== -->
    <!-- [UI5 제거] nodeIntegration 에서 jQuery UMD 가 module.exports 로 등록되어 전역(window.jQuery)이
         비게 되므로, 로드 동안 module 을 잠시 숨겨 브라우저 전역 경로로 등록시킨다.
         (구: UI5 부트스트랩이 전역 jQuery 를 제공했으나 제거됨) -->
    <script>window.__m_bak = window.module; window.module = undefined;</script>
    <script src="../../js/jquery.min.js"></script>
    <script>window.module = window.__m_bak; delete window.__m_bak;</script>

    <!-- 테마 API + 공통 UI 컴포넌트 (shell.css 의 짝) -->
    <script src="./theme/theme-api.js"></script>

    <!-- [테마 기반] 첫 페인트 전에 "설정된 테마"를 적용 → var(--app-bg) 가 해당 테마 배경으로
         해석되어 흰색 플래시 없이 사용자 테마 배경으로 시작한다.
         테마명: 로그인 창이 넘긴 쿼리(THEME) 우선 → 없으면 메타 수신 후 getThemeInfo() 폴백
         (메타가 늦게 오면 ws10_html.js 가 렌더 시 테마를 재적용한다). -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sTheme = q.get("THEME");
                var sBg = q.get("BGCOL");
                // [흰색 방지 — 동기] 테마 CSS(<link>)는 비동기 로드라 그 사이 --app-bg 가 화이트 기본으로
                //   보인다. 창이 이미 아는 테마 배경색(BGCOL)을 동기 인라인 변수(--boot-bg)로 즉시 깔아
                //   첫 페인트부터 테마 배경이 되게 한다(static <style> 가 var(--boot-bg) 소비).
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                if (!sTheme) {
                    var o = (window.parent && parent.getThemeInfo) ? parent.getThemeInfo() : null;
                    sTheme = o && o.THEME;
                    if (!sBg && o && o.BGCOL) { document.documentElement.style.setProperty("--boot-bg", o.BGCOL); }
                }
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
            } catch (e) { /* 메타 수신 후 ws10_html.js 가 테마 재적용 */ }
        })();
    </script>

    <!-- 공통 리소스 로드 -->
    <script src="../resources/index.js"></script>

    <style>
        .sapMPageFloatingFooter .sapUiHidden {
            transition: top 0.35;
        }

        /* [흰색 플래시 방지 — 테마 기반] 부팅 캔버스를 "설정된 테마"의 배경(var(--app-bg))으로 시작.
           head 의 조기 테마 적용(아래 script)이 data-theme 을 설정 → --app-bg 가 해당 테마 배경으로
           해석된다(라이트/다크/퍼플 등 사용자 테마 그대로). 하드코딩 색 없음.
           (스타일 블록을 stylesheet 링크 "뒤"에 두어 shell.css 의 body 배경보다 우선) */
        html,
        body {
            overflow-y: hidden;
            height: 100%;
            margin: 0;
            background: var(--boot-bg, var(--app-bg));
        }

        #content {
            background: var(--boot-bg, var(--app-bg));
        }
    </style>
