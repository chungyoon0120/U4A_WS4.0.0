<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- ===== 공통 헤더(.u4a-titlebar)·버튼·체크박스·패널·토큰 (editorFrame 과 동일 짝) ===== -->
    <link rel="stylesheet" href="../../theme/tokens.css">
    <link rel="stylesheet" href="../../theme/shell.css">
    <link rel="stylesheet" href="../../theme/bootstrap-skin.css">
    <link rel="stylesheet" href="../../../../lib/fontawesome/7.2.0/css/all.min.css">
    <link rel="stylesheet" href="errorPageEditorFrame.css">

    <script src="../../theme/theme-api.js"></script>
    <script src="../../theme/u4a-ui.js"></script>

    <!-- [흰색 플래시 방지 — 동기] opener 가 넘긴 THEME/BGCOL/TITLE 을 첫 페인트 전에 적용 -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sBg = q.get("BGCOL");
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                var sTheme = q.get("THEME");
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
                var sTitle = q.get("TITLE");
                if (sTitle) { document.title = sTitle; }
            } catch (e) { /* errorPageEditorFrame.js 에서 재적용 */ }
        })();
    </script>
</head>

<body>

    <!-- ===== 공통 커스텀 헤더(frameless) — 로고/제목/닫기 ===== -->
    <header class="u4a-titlebar" id="errTitlebar">
        <img class="u4a-titlebar__logo" id="errLogo" src="" alt="U4A">
        <span class="u4a-titlebar__title" id="errTitle"></span>
        <span class="u4a-titlebar__spacer"></span>
        <button class="u4a-winbtn u4a-winbtn--close" data-action="close" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <!-- ===== 에디터 툴바 (원본 SplitApp Detail customHeader) =====
         LEFT: [☰ 네비 토글] [⬅ Read me] · RIGHT: [Pretty Print] [☐ Enable Error Page] [Save] -->
    <div class="u4aErrToolbar" id="errToolbar">
        <button type="button" class="u4a-btn u4aErrNavToggle" id="errNavToggle" aria-pressed="false">
            <i class="fa-solid fa-bars"></i>
        </button>
        <span class="u4aErrHeadLabel">
            <i class="fa-solid fa-arrow-left"></i><span id="errReadme"></span>
        </span>
        <span class="u4aErrToolSpacer"></span>
        <button type="button" class="u4a-btn u4aErrPretty" id="errPrettyBtn"><i class="fa-solid fa-wand-magic-sparkles"></i><span></span></button>
        <label class="u4a-check u4aErrEnable" id="errEnableWrap">
            <input type="checkbox" id="errEnableChk"><span id="errEnableTxt"></span>
        </label>
        <button type="button" class="u4a-btn u4a-btn--emphasized u4aErrSave" id="errSaveBtn">
            <i class="fa-solid fa-check"></i><span></span>
        </button>
    </div>

    <!-- ===== 본체 = [Master 네비 드로어] | [Monaco 호스트] ===== -->
    <div class="u4aErrBody" id="errBody">
        <!-- 네비(드로어) — Preview + How-to-Use. frame.js 가 채움. 기본 닫힘(원본 SplitApp HideMode). -->
        <aside class="u4aErrNav" id="errNav" data-open="false"></aside>
        <!-- 콘텐츠 = 공통 Monaco 호스트(editorPopup/host 재사용) iframe. 등장 페이드(opacity). -->
        <div class="u4aErrContent" id="errContent">
            <iframe id="errHost" name="errHost" frameborder="0" allowfullscreen></iframe>
        </div>
    </div>

    <!-- ===== 푸터 = [줌 컨트롤 −/%/+(왼쪽)] ···· [Save(오른쪽)] (에디터 시리즈와 동일 공통 UX) ===== -->
    <footer class="u4aErrFooter" id="errFooter">
        <div class="u4aErrZoom">
            <button type="button" class="u4a-btn u4aErrZoomBtn u4aErrZoomStep" id="errZoomOut" title="Ctrl + Wheel ↓">
                <i class="fa-solid fa-minus"></i>
            </button>
            <button type="button" class="u4a-btn u4aErrZoomBtn u4aErrZoomPct" id="errZoomBtn">
                <i class="fa-solid fa-magnifying-glass"></i><span>100%</span>
            </button>
            <button type="button" class="u4a-btn u4aErrZoomBtn u4aErrZoomStep" id="errZoomIn" title="Ctrl + Wheel ↑">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <span class="u4aErrFootSpacer"></span>
        <!-- 사용자 편의용 푸터 Save(상단 툴바 Save 와 동일 동작·동일 활성조건). -->
        <button type="button" class="u4a-btn u4a-btn--emphasized u4aErrSave" id="errSaveBtnFoot">
            <i class="fa-solid fa-check"></i><span></span>
        </button>
    </footer>

    <!-- 로딩 오버레이 (토스트는 공통 .u4a-toast 를 frame.js 가 동적 생성) -->
    <div id="errBusy"><div class="u4aErrSpinner"></div></div>

    <script src="errorPageEditorFrame.js"></script>

</body>

</html>
