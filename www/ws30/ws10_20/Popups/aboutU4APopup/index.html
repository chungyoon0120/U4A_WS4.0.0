<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <!-- <title>About U4A IDE</title> -->

    <!-- ===== 공통 헤더(.u4a-titlebar) 적용을 위한 테마/컴포넌트 (index.html/extopen 과 동일 짝) ===== -->
    <link rel="stylesheet" href="../../theme/tokens.css">
    <link rel="stylesheet" href="../../theme/shell.css">
    <!-- ★ bootstrap-skin = 공통 헤더의 실제 모양(.u4a-titlebar 36px 그라데이션 + 윈도우 버튼) -->
    <link rel="stylesheet" href="../../theme/bootstrap-skin.css">
    <link rel="stylesheet" href="../../../../lib/fontawesome/7.2.0/css/all.min.css">

    <script src="../../theme/theme-api.js"></script>
    <script src="../../theme/u4a-ui.js"></script>

    <!-- [흰색 플래시 방지 — 동기] opener 가 넘긴 THEME/BGCOL/TITLE 을 첫 페인트 전에 적용 -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sBg = q.get("BGCOL");
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                var sTheme = q.get("THEME");
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
                var sTitle = q.get("TITLE");
                if (sTitle) { document.title = sTitle; }
            } catch (e) { /* DOMContentLoaded 에서 재적용 */ }
        })();
    </script>

    <style>
        html, body {
            height: 100%;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            /* 타이틀바(고정) + 콘텐츠(가변) 세로 스택 */
            display: flex;
            flex-direction: column;
            background: var(--boot-bg, var(--app-bg));
        }
        /* 콘텐츠 영역 = iframe (타이틀바 아래 전체 채움) */
        #aboutContent {
            flex: 1 1 auto;
            position: relative;
            min-height: 0;
            background: var(--boot-bg, var(--app-bg));
        }
        #mainFRAME {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: 0;
            overflow: hidden;
        }
    </style>

</head>

<body>

    <!-- ===== 공통 커스텀 헤더 (메인 창 .u4a-titlebar 와 동일 — 이 창은 modal·비리사이즈라 닫기만) ===== -->
    <header class="u4a-titlebar" id="aboutTitlebar">
        <img class="u4a-titlebar__logo" id="aboutLogo" src="logo.png" alt="U4A">
        <span class="u4a-titlebar__title" id="aboutTitle"></span>
        <span class="u4a-titlebar__spacer"></span>
        <button class="u4a-winbtn u4a-winbtn--close" data-action="close" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <div id="aboutContent">
        <iframe id="mainFRAME" frameborder="0"></iframe>
    </div>

    <script>

        /************************************************************************
         * 에러 감지
         ************************************************************************/
        var REMOTE = require('@electron/remote'),
            PATH = REMOTE.require('path'),
            APP = REMOTE.app,
            APPPATH = APP.getAppPath(),
            PATHINFOURL = PATH.join(APPPATH, "ws30", "resources", "pathInfo.js"),
            PATHINFO = require(PATHINFOURL),
            WSUTIL = require(PATHINFO.WSUTIL),
            WSERR = require(PATHINFO.WSTRYCATCH);

        // 브라우저의 쿼리 스트링 정보
        let oQueryParams = WSUTIL.QueryString.parse(location.href);

        var zconsole = WSERR(window, document, console);

        var CURRWIN = REMOTE.getCurrentWindow();
        var BROWSKEY = oQueryParams.browserkey;
        var IPCRENDERER = require('electron').ipcRenderer;
    </script>

    <script>
        var SERVPATH = "",
            WSVER = "",
            WSPATCH_LEVEL = "";

        document.addEventListener('DOMContentLoaded', function() {

            let remote = require('@electron/remote');
            let ipcRenderer = require('electron').ipcRenderer;
            let oWin = remote.getCurrentWindow();

            let path = remote.require('path');

            oWin.setOverlayIcon(path.join(__dirname, 'U4A_V1.ico'), '');

            //menu 라인 삭제
            oWin.setMenu(null);

            /************************************************************************
             * 공통 헤더(.u4a-titlebar) 초기화 — 로고/제목/닫기.
             ************************************************************************/
            try {
                // 로고 = 메인 창과 동일(APPPATH/img/logo.png)
                var oLogo = document.getElementById("aboutLogo");
                if (oLogo) {
                    try { oLogo.src = encodeURI("file:///" + path.join(APPPATH, "img", "logo.png").replaceAll("\\", "/")); } catch (e) { }
                }
                // 제목 = opener 가 넘긴 창 제목(About U4A WS IDE)
                var oTitle = document.getElementById("aboutTitle");
                if (oTitle) {
                    var sTtl = "";
                    try { sTtl = document.title || CURRWIN.getTitle() || ""; } catch (e) { sTtl = document.title || ""; }
                    oTitle.textContent = sTtl;
                }
                // 닫기 (modal·closable 토글은 opener 가 로드 후 true 로) — 메인 창과 동일하게 close() 호출
                var oClose = document.querySelector('#aboutTitlebar [data-action="close"]');
                if (oClose) {
                    oClose.addEventListener("click", function () {
                        try { CURRWIN.close(); } catch (e) { }
                    });
                }
            } catch (e) { /* 헤더 초기화 실패해도 본문(iframe)은 정상 */ }

            ipcRenderer.on('if-about-u4a', (event, IF_DATA) => {

                SERVPATH = IF_DATA.SERVPATH;
                WSVER = IF_DATA.WSVER;
                WSPATCH_LEVEL = IF_DATA.WSPATCH_LEVEL;

                let oFrame = document.getElementById("mainFRAME");

                oFrame.src = "frame.html";

            });

        });



        function gfn_remote() {

            return require('@electron/remote');

        }
    </script>

</body>

</html>
