<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- ===== 공통 헤더(.u4a-titlebar)·버튼·입력칸·토큰 (errorPageEditorFrame 과 동일 짝) ===== -->
    <link rel="stylesheet" href="../../theme/tokens.css">
    <link rel="stylesheet" href="../../theme/shell.css">
    <link rel="stylesheet" href="../../theme/bootstrap-skin.css">
    <link rel="stylesheet" href="../../../../lib/fontawesome/7.2.0/css/all.min.css">
    <link rel="stylesheet" href="frame.css">

    <script src="../../theme/theme-api.js"></script>
    <script src="../../theme/u4a-ui.js"></script>

    <!-- [흰색 플래시 방지 — 동기] opener 가 넘긴 THEME/BGCOL/TITLE 을 첫 페인트 전에 적용 -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sBg = q.get("BGCOL");
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                var sTheme = q.get("THEME");
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
                var sTitle = q.get("TITLE");
                if (sTitle) { document.title = sTitle; }
            } catch (e) { /* frame.js 에서 재적용 */ }
        })();
    </script>
</head>

<body>

    <!-- ===== 공통 커스텀 헤더(frameless) — 로고/제목/닫기 ===== -->
    <header class="u4a-titlebar" id="docTitlebar">
        <img class="u4a-titlebar__logo" id="docLogo" src="" alt="U4A">
        <span class="u4a-titlebar__title" id="docTitle"></span>
        <span class="u4a-titlebar__spacer"></span>
        <button class="u4a-winbtn u4a-winbtn--close" data-action="close" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <!-- ===== 본체 = [문서 관리자 사이드바] | [디테일(헤더+에디터)] ===== -->
    <div class="u4aDocBody" id="docBody">

        <!-- 사이드바 = 문서 관리자(검색 + 메타 목록). 헤더에 새 문서(+). -->
        <aside class="u4aDocNav" id="docNav">
            <div class="u4aDocNavHead">
                <span class="u4aDocNavHead__title" id="docNavHead"></span>
                <button type="button" class="u4aDocNewBtn" id="docNewBtn">
                    <i class="fa-solid fa-file-circle-plus"></i>
                </button>
            </div>
            <div class="u4aDocSearch">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" id="docSearch" class="u4aDocSearch__input">
            </div>
            <div class="u4aDocList" id="docList"></div>
        </aside>

        <!-- 공통 스플릿바(shell.css .u4a-splitter__bar 풀스킨 소비) — 사이드바|디테일 리사이즈.
             더블클릭=최초폭 복귀는 전역 자동(_installGlobalSplitterReset). 드래그는 frame.js. -->
        <div class="u4a-splitter__bar" id="docSplitBar" role="separator" aria-orientation="vertical"></div>

        <!-- 디테일 = [문서 헤더(제목/메타/상태 + 삭제·저장)] + [에디터(자체 포맷툴바)] -->
        <section class="u4aDocDetail" id="docDetail">

            <!-- 문서 헤더 — 좌: 제목(크게) + 메타(수정일/작성자) + 상태칩 · 우: 삭제/저장 -->
            <div class="u4aDocHead" id="docHead">
                <div class="u4aDocHead__main">
                    <!-- 제목 입력 — frame.js 가 createField 로 채움(헤더 스코프에서 큰 글씨/무테두리). -->
                    <div class="u4aDocTitleRow" id="docTitleRow"></div>
                    <div class="u4aDocMeta" id="docMeta">
                        <span class="u4aDocMeta__item" id="docMetaDate" hidden><i class="fa-regular fa-clock"></i><span></span></span>
                        <span class="u4aDocMeta__item" id="docMetaUser" hidden><i class="fa-regular fa-user"></i><span></span></span>
                        <span class="u4aDocStatus" id="docStatus" hidden><i class="fa-solid fa-circle"></i><span></span></span>
                    </div>
                </div>
                <div class="u4aDocHead__actions">
                    <button type="button" class="u4a-btn u4aDocBtnDanger" id="docDeleteBtn">
                        <i class="fa-solid fa-trash-can"></i><span></span>
                    </button>
                    <button type="button" class="u4a-btn u4a-btn--emphasized" id="docSaveBtn">
                        <i class="fa-solid fa-floppy-disk"></i><span></span>
                    </button>
                </div>
            </div>

            <!-- 콘텐츠 = TinyMCE WYSIWYG(textarea 를 tinymce.init 가 .tox-tinymce 로 승격). 등장 페이드(opacity). -->
            <div class="u4aDocContent" id="docContent">
                <textarea id="docEditor"></textarea>
            </div>

        </section>
    </div>

    <!-- (푸터 줌 바 없음 — 본문 줌은 Ctrl+휠로만, 원본 fn_setZoomEvt 동작 동일) -->

    <!-- 로딩 오버레이 = 공통 busy(.u4a-busy, shell.css SSOT — 카드+이중링 스피너, data-busy 토글, 0.3s 지연).
         토스트는 공통 .u4a-toast 를 frame.js 가 동적 생성. -->
    <div class="u4a-busy" id="docBusy">
        <div class="u4a-busy__card">
            <div class="u4a-busy__spinner"></div>
        </div>
    </div>

    <!-- TinyMCE 6(MIT) 자체호스팅. nodeIntegration 에서 UMD 가 module.exports 로 빠져 window.tinymce 가
         비는 것을 막기 위해 로드 동안 module 을 숨긴다(index.html jQuery 패턴 동일). 이렇게 해야
         window.tinymce 전역 + 스킨/플러그인 baseURL 자동감지(이 <script> 의 src 기준)가 동작한다.
         스킨/콘텐츠 CSS 는 tinymce 가 baseURL 에서 동적 로드(여기서 <link> 불필요). -->
    <script>window.__tm_m = window.module; window.__tm_e = window.exports; window.module = undefined; window.exports = undefined;</script>
    <script src="../../../../lib/tinymce/tinymce.min.js"></script>
    <script>window.module = window.__tm_m; window.exports = window.__tm_e; delete window.__tm_m; delete window.__tm_e;</script>

    <script src="frame.js"></script>

</body>

</html>
