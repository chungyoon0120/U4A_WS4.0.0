<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- ===== 공통 헤더(.u4a-titlebar)·버튼·입력칸·토큰 (errorPageEditorFrame 과 동일 짝) ===== -->
    <link rel="stylesheet" href="../../theme/tokens.css">
    <link rel="stylesheet" href="../../theme/shell.css">
    <link rel="stylesheet" href="../../theme/bootstrap-skin.css">
    <link rel="stylesheet" href="../../../../lib/fontawesome/7.2.0/css/all.min.css">
    <!-- Jodit(MIT, es2018, Chromium93 안전) WYSIWYG 스킨 — frame.css 보다 먼저 로드해야
         frame.css 의 .jodit_theme_u4a(토큰 매핑)가 Jodit 기본값을 이긴다(동일 특이성=나중 로드 승). -->
    <link rel="stylesheet" href="../../../../lib/jodit/jodit.min.css">
    <link rel="stylesheet" href="frame.css">

    <script src="../../theme/theme-api.js"></script>
    <script src="../../theme/u4a-ui.js"></script>

    <!-- [흰색 플래시 방지 — 동기] opener 가 넘긴 THEME/BGCOL/TITLE 을 첫 페인트 전에 적용 -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sBg = q.get("BGCOL");
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                var sTheme = q.get("THEME");
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
                var sTitle = q.get("TITLE");
                if (sTitle) { document.title = sTitle; }
            } catch (e) { /* frame.js 에서 재적용 */ }
        })();
    </script>
</head>

<body>

    <!-- ===== 공통 커스텀 헤더(frameless) — 로고/제목/닫기 ===== -->
    <header class="u4a-titlebar" id="docTitlebar">
        <img class="u4a-titlebar__logo" id="docLogo" src="" alt="U4A">
        <span class="u4a-titlebar__title" id="docTitle"></span>
        <span class="u4a-titlebar__spacer"></span>
        <button class="u4a-winbtn u4a-winbtn--close" data-action="close" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <!-- ===== 본체 = [문서목록 드로어(Master)] | [디테일(Detail)] ===== -->
    <div class="u4aDocBody" id="docBody">

        <!-- 문서 목록 드로어 — 원본 SplitApp Master(NavigationList). 기본 열림, ☰ 로 토글. -->
        <aside class="u4aDocNav" id="docNav" data-open="true">
            <div class="u4aDocNavHead" id="docNavHead"></div>
            <div class="u4aDocList" id="docList"></div>
        </aside>

        <!-- 디테일 = 툴바 + 제목 + 에디터(원본 SplitApp Detail). -->
        <section class="u4aDocDetail" id="docDetail">

            <!-- 툴바(원본 Detail customHeader) — 좌:☰/생성/삭제/저장 · 우:변경이력 -->
            <div class="u4aDocToolbar" id="docToolbar">
                <button type="button" class="u4a-btn u4aDocNavToggle" id="docNavToggle" aria-pressed="true">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <button type="button" class="u4a-btn u4aDocToolBtn" id="docCreateBtn">
                    <i class="fa-solid fa-file-circle-plus"></i>
                </button>
                <button type="button" class="u4a-btn u4aDocToolBtn u4a-btn--negative" id="docDeleteBtn">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
                <button type="button" class="u4a-btn u4aDocToolBtn u4a-btn--emphasized" id="docSaveBtn">
                    <i class="fa-solid fa-floppy-disk"></i>
                </button>
                <span class="u4aDocToolSpacer"></span>
                <span class="u4aDocStamp" id="docStamp"></span>
            </div>

            <!-- 제목 입력(원본 sap.m.Input) — frame.js 가 createField 로 채움. -->
            <div class="u4aDocTitleRow" id="docTitleRow"></div>

            <!-- 콘텐츠 = Jodit WYSIWYG(textarea 를 Jodit.make 가 .jodit-container 로 승격). 등장 페이드(opacity). -->
            <div class="u4aDocContent" id="docContent">
                <textarea id="docEditor"></textarea>
            </div>

        </section>
    </div>

    <!-- ===== 푸터 = [줌 컨트롤 −/%/+(왼쪽)] (에디터 시리즈와 동일 공통 UX) ===== -->
    <footer class="u4aDocFooter" id="docFooter">
        <div class="u4aDocZoom">
            <button type="button" class="u4a-btn u4aDocZoomBtn u4aDocZoomStep" id="docZoomOut" title="Ctrl + Wheel ↓">
                <i class="fa-solid fa-minus"></i>
            </button>
            <button type="button" class="u4a-btn u4aDocZoomBtn u4aDocZoomPct" id="docZoomBtn">
                <i class="fa-solid fa-magnifying-glass"></i><span>100%</span>
            </button>
            <button type="button" class="u4a-btn u4aDocZoomBtn u4aDocZoomStep" id="docZoomIn" title="Ctrl + Wheel ↑">
                <i class="fa-solid fa-plus"></i>
            </button>
        </div>
        <span class="u4aDocFootSpacer"></span>
    </footer>

    <!-- 로딩 오버레이 (토스트는 공통 .u4a-toast 를 frame.js 가 동적 생성) -->
    <div id="docBusy"><div class="u4aDocSpinner"></div></div>

    <!-- Jodit(MIT) WYSIWYG 본체는 frame.js 가 require() 로 로드한다(nodeIntegration 의 webpack UMD →
         module.exports 경로가 결정적, 전역 등록 트릭 불필요). CSS 만 head 에서 <link>. -->
    <script src="frame.js"></script>

</body>

</html>
