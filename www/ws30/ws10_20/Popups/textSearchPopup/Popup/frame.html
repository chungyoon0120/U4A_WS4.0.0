<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <!-- Window Text Search 팝업(별도 BrowserWindow) — HTML5 변환.
         원본 UI5(sap.m) 뷰를 공통 컴포넌트(.u4a-field/.u4a-btn-icon)로 대체.
         스택은 최소(FA/tokens/shell/theme-api/u4a-ui) — Bootstrap 컴포넌트 미사용.
         경로: Popup/ 기준 → theme=../../../theme, lib=../../../../../lib. theme-api 는
         자기 script src 로 THEME_DIR 자동해석(경로 독립). -->
    <link rel="stylesheet" href="../../../../../lib/fontawesome/7.2.0/css/all.min.css">
    <link rel="stylesheet" href="../../../theme/tokens.css">
    <link rel="stylesheet" href="../../../theme/shell.css">
    <script src="../../../theme/theme-api.js"></script>
    <script src="../../../theme/u4a-ui.js"></script>

    <style>
        /* 불투명 창(opener transparent:false) — 바가 창을 꽉 채우는 직사각(둥근모서리/여백 없음 → Windows 투명창 글리치 회피).
           ★ 배경 = "라이트" 바 + 테마 시그니처색(accent) 틴트 2겹 + 또렷한 accent 보더.
             라이트라서 공통 전경(입력칸·아이콘·카운트·구분선)이 themed 색 그대로 또렷 — 어두운 바였으면 전경을
             일일이 덮어야 해서 대비 사고가 남(카운트 안 보임 등). accent 는 _applySkin 이 전 테마 인라인 세팅(퍼플/레드/그린/블루). */
        html, body { margin: 0; height: 100%; overflow: hidden; background: var(--surface-raised, var(--surface)); }

        .u4aTxtSrchWin {
            display: flex; align-items: center; gap: .25rem;
            height: 100%; box-sizing: border-box; padding: .25rem .5rem;
            background:
                linear-gradient(var(--u4a-accent-soft, transparent), var(--u4a-accent-soft, transparent)),
                linear-gradient(var(--u4a-accent-soft, transparent), var(--u4a-accent-soft, transparent)),
                var(--surface-raised, var(--surface));
            border: .125rem solid var(--u4a-accent, var(--divider, var(--line)));
        }
        .u4aTxtSrchWin .u4aTxtSrchField { flex: 1 1 auto; min-width: 0; }
        .u4aTxtSrchWin__count { flex: 0 0 auto; min-width: 3rem; text-align: center; font-size: .75rem; color: var(--text-muted); }
        .u4aTxtSrchWin__sep { flex: 0 0 auto; width: .0625rem; height: 1.25rem; background: var(--line); margin: 0 .15rem; }
    </style>
</head>

<body>

    <div id="u4aTxtSrch"></div>

    <script>
        var oScr = document.createElement("script");
        oScr.src = "frame.js";
        document.body.appendChild(oScr);
    </script>

</body>

</html>
