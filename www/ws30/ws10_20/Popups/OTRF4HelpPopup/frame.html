<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- OTR Manager(별도 BrowserWindow) 창 셸 — UI5(sap-ui-bootstrap, index.js) → HTML5 변환.
         창 크롬(공통 .u4a-titlebar)·테마·Busy·IPC 는 frame.js, 검색폼/결과 테이블 본문은 iframe(index.html).
         스택: tokens → shell → bootstrap-skin(.u4a-titlebar/.u4a-winbtn 스킨) → FA → theme-api → u4a-ui.
         경로: Popups/OTRF4HelpPopup 기준 → theme=../../theme, lib=../../../../lib. (06.팝업 7.5 / browser-window-common-ux) -->
    <link rel="stylesheet" href="../../theme/tokens.css">
    <link rel="stylesheet" href="../../theme/shell.css">
    <link rel="stylesheet" href="../../theme/bootstrap-skin.css">
    <link rel="stylesheet" href="../../../../lib/fontawesome/7.2.0/css/all.min.css">
    <link rel="stylesheet" href="frame.css">

    <script src="../../theme/theme-api.js"></script>
    <script src="../../theme/u4a-ui.js"></script>

    <!-- [흰색 플래시 방지 — 동기] opener 가 넘긴 BGCOL/THEME/TITLE 을 첫 페인트 전에 적용 -->
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sBg = q.get("BGCOL");
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                var sTheme = q.get("THEME");
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(window.U4ATheme.normalize ? window.U4ATheme.normalize(sTheme) : sTheme);
                }
                var sTitle = q.get("TITLE");
                if (sTitle) { document.title = sTitle; }
            } catch (e) { /* frame.js 에서 재적용 */ }
        })();
    </script>
</head>

<body>

    <!-- ===== 공통 커스텀 헤더(frameless) — 로고/제목/min·max·close (CSS Editor=editorFrame 동일) ===== -->
    <header class="u4a-titlebar" id="otrTitlebar">
        <img class="u4a-titlebar__logo" id="otrLogo" src="" alt="U4A">
        <span class="u4a-titlebar__title" id="otrTitle"></span>
        <div class="u4a-titlebar__spacer"></div>
        <button type="button" class="u4a-winbtn" id="otrWinMin" title="Minimize"><i class="fa-solid fa-window-minimize"></i></button>
        <button type="button" class="u4a-winbtn" id="otrWinMax" title="Maximize"><i class="fa-solid fa-window-maximize"></i></button>
        <button type="button" class="u4a-winbtn u4a-winbtn--close" id="otrWinClose" data-action="close" title="Close"><i class="fa-solid fa-xmark"></i></button>
    </header>

    <!-- 본문 = 검색폼/결과 테이블(index.html) iframe. 데이터 도착 후 src 주입 -->
    <div id="otrContent">
        <iframe id="ws_frame" name="ws_frame" allowfullscreen></iframe>
    </div>

    <!-- Page Loading Start -->
    <div id="u4a_main_load" class="u4a_loaders">
        <div class="cl_ring">LOADING<span class="cl_ringArea"></span></div>
    </div>
    <!-- Page Loading End -->

    <script>
        /************************************************************************
         * 에러 감지 — index.js(iframe) 가 parent.WSERR 로 재사용
         ************************************************************************/
        var REMOTE = require('@electron/remote'),
            PATH = REMOTE.require('path'),
            APP = REMOTE.app,
            APPPATH = APP.getAppPath(),
            PATHINFOURL = PATH.join(APPPATH, "ws30", "resources", "pathInfo.js"),
            PATHINFO = require(PATHINFOURL),
            WSERR = require(PATHINFO.WSTRYCATCH);

        var zconsole = WSERR(window, document, console);
    </script>

    <script src="frame.js"></script>
</body>

</html>
