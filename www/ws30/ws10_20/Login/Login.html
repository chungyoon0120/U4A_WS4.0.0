<!DOCTYPE html>
<html>

<head>
    <title>U4A Workspace #Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- Font Awesome 7.2.0 (아이콘) -->
    <link rel="stylesheet" href="../../../lib/fontawesome/7.2.0/css/all.min.css">

    <!-- 테마 시스템 (doc 12 §6.1) : tokens → themes → shell -->
    <link rel="stylesheet" href="../theme/tokens.css">
    <link rel="stylesheet" href="../theme/themes/horizon_white.css">
    <link rel="stylesheet" href="../theme/themes/horizon_dark.css">
    <link rel="stylesheet" href="../theme/themes/horizon_purple.css">
    <link rel="stylesheet" href="../theme/themes/horizon_red.css">
    <link rel="stylesheet" href="../theme/themes/horizon_green.css">
    <link rel="stylesheet" href="../theme/shell.css">

    <!-- 로그인 컴포넌트 CSS (theme/tokens.css 의 var(--*)만 소비) -->
    <link rel="stylesheet" href="css/login.css">

    <script>
        /************************************************************************
         * Electron 자원 (원본 계약 유지) — Login.js 가 parent.* 로 참조한다.
         ************************************************************************/
        var require = parent.require,
            REMOTE = require('@electron/remote'),
            IPCMAIN = REMOTE.require('electron').ipcMain,
            PATH = REMOTE.require('path'),
            APP = REMOTE.app,
            APPPATH = APP.getAppPath(),
            PATHINFO = require(PATH.join(APPPATH, "ws30", "resources", "pathInfo.js")),
            WSERR = require(PATHINFO.WSTRYCATCH);

        var zconsole = WSERR(window, document, console);
    </script>

    <!-- 테마 API + 초기 테마 동기 적용 (첫 페인트 전 → 흰색 깜빡임 방지) -->
    <script src="../theme/theme-api.js"></script>
    <script>
        (function () {
            try {
                var oThemeInfo = parent.getThemeInfo && parent.getThemeInfo();
                var sTheme = oThemeInfo && oThemeInfo.THEME;
                if (sTheme && window.U4ATheme) {
                    document.documentElement.dataset.theme = window.U4ATheme.normalize(sTheme);
                }
            } catch (e) { /* 실패 시 기본(:root) */ }
        })();
    </script>
</head>

<body>

    <!-- 셸 컨텐츠 (Login.js 가 동적 렌더) — 초기 hidden, 렌더 후 페이드인 -->
    <div id="content" class="u4a-login u4a-fade" style="display:none;"></div>

    <!-- 로그인 로직 (테마 API 는 head 에서 선로드) -->
    <script src="Login.js"></script>

</body>

</html>
