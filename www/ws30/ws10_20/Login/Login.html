<!DOCTYPE html>
<html>

<head>
    <title>U4A Workspace #Login</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="Content-Type" content="text/html;charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />

    <!-- Font Awesome 7.2.0 (아이콘) -->
    <link rel="stylesheet" href="../../../lib/fontawesome/7.2.0/css/all.min.css">

    <!-- Bootstrap 5.0.2 (레이아웃/컴포넌트 토대) — 테마보다 먼저 로드해
         브리지/shell 이 색을 override 하도록 한다. (ServerList 와 동일 컨셉) -->
    <link rel="stylesheet" href="../../../lib/bootstrap/5.0.2/css/bootstrap.min.css">

    <!-- 테마 시스템 (doc 12 §6.1) : tokens(=white 기본) → shell → bootstrap 브리지 → login.
         로그인은 단일 고정 테마만 쓰므로 5종을 전부 로드하지 않고,
         활성 테마 1종만 아래 스크립트에서 동적 로드한다.
         (horizon_white 는 tokens.css 의 :root 가 곧 기본값이라 별도 CSS 불필요) -->
    <link rel="stylesheet" href="../theme/tokens.css">
    <link rel="stylesheet" href="../theme/shell.css">
    <!-- Bootstrap 컴포넌트 색을 프로젝트 토큰으로 입히는 브리지 (bootstrap·shell 뒤) -->
    <link rel="stylesheet" href="../theme/bootstrap-bridge.css">
    <!-- Bootstrap 데모 스킨 (전 화면 공통 — 36px 헤더/--sl- 팔레트/컴포넌트 데모색) -->
    <link rel="stylesheet" href="../theme/bootstrap-skin.css">

    <!-- 로그인 컴포넌트 CSS (theme/tokens.css 의 var(--*)만 소비) -->
    <link rel="stylesheet" href="css/login.css">

    <script>
        /************************************************************************
         * Electron 자원 (원본 계약 유지) — Login.js 가 parent.* 로 참조한다.
         ************************************************************************/
        var require = parent.require,
            REMOTE = require('@electron/remote'),
            IPCMAIN = REMOTE.require('electron').ipcMain,
            PATH = REMOTE.require('path'),
            APP = REMOTE.app,
            APPPATH = APP.getAppPath(),
            PATHINFO = require(PATH.join(APPPATH, "ws30", "resources", "pathInfo.js")),
            WSERR = require(PATHINFO.WSTRYCATCH);

        var zconsole = WSERR(window, document, console);
    </script>

    <!-- 테마 API + 공통 UI 컴포넌트 라이브러리 (shell.css 의 짝) -->
    <script src="../theme/theme-api.js"></script>
    <script src="../theme/u4a-ui.js"></script>

    <!-- 초기 테마 동기 적용 (첫 페인트 전 → 흰색 깜빡임 방지).
         테마 CSS(<link>)는 비동기 로드라, 그 사이 --app-bg 가 화이트 기본으로 보인다.
         vw_main 이 iframe src 쿼리로 넘긴 BGCOL 을 동기 --boot-bg 로 즉시 깔고(첫 페인트부터
         테마 배경), 테마명으로 컴포넌트 테마를 적용한다(쿼리 없으면 parent.getThemeInfo 폴백). -->
    <style>html, body { background: var(--boot-bg, var(--app-bg)); }</style>
    <script>
        (function () {
            try {
                var q = new URLSearchParams(location.search);
                var sTheme = q.get("THEME");
                var sBg = q.get("BGCOL");
                if (!sTheme || !sBg) {
                    var o = (parent.getThemeInfo && parent.getThemeInfo()) || null;
                    if (o) { sTheme = sTheme || o.THEME; sBg = sBg || o.BGCOL; }
                }
                if (sBg) { document.documentElement.style.setProperty("--boot-bg", sBg); }
                if (sTheme && window.U4ATheme) {
                    window.U4ATheme.apply(sTheme);
                }
            } catch (e) { /* 실패 시 기본(:root) */ }
        })();
    </script>
</head>

<body>

    <!-- 셸 컨텐츠 (Login.js 가 동적 렌더) — 초기 hidden, 렌더 후 페이드인 -->
    <div id="content" class="u4a-login u4a-fade" style="display:none;"></div>

    <!-- Bootstrap 번들(Popper 포함) — dropdown/modal/tooltip JS. Login.js 보다 먼저. -->
    <script src="../../../lib/bootstrap/5.0.2/js/bootstrap.bundle.min.js"></script>

    <!-- 로그인 로직 (테마 API 는 head 에서 선로드) -->
    <script src="Login.js"></script>

</body>

</html>
